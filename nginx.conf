server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker interner DNS-Resolver
    resolver 127.0.0.11 valid=30s;
    set $backend http://backend:5000;

    # Vue Router – alle unbekannten Pfade auf index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API, Auth und statische Backend-Dateien an Backend proxyen
    location ~ ^/(api|auth|logout|start-auth|static)/ {
        proxy_pass         $backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cookie_path  / /;
    }
}