name: Deploy via Dokploy

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: self-hosted
    steps:
      - name: Trigger Backend Dev Deploy
        run: |
          curl -k -X POST https://srv-ai-apps.int.alpha-it-innovations.org/api/deploy/DEV_BACKEND_WEBHOOK_PLACEHOLDER \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d '{
              "ref": "refs/heads/dev",
              "repository": {
                "full_name": "AlphaITInnovations/AlphaRequestManager"
              }
            }'

      - name: Trigger Frontend Dev Deploy
        run: |
          curl -k -X POST https://srv-ai-apps.int.alpha-it-innovations.org/api/deploy/DEV_FRONTEND_WEBHOOK_PLACEHOLDER \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d '{
              "ref": "refs/heads/dev",
              "repository": {
                "full_name": "AlphaITInnovations/AlphaRequestManager"
              }
            }'

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Trigger Backend Prod Deploy
        run: |
          curl -k -X POST https://srv-ai-apps.int.alpha-it-innovations.org/api/deploy/FLRGusi--QdRevMwRJV6u \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d '{
              "ref": "refs/heads/main",
              "repository": {
                "full_name": "AlphaITInnovations/AlphaRequestManager"
              }
            }'

      - name: Trigger Frontend Prod Deploy
        run: |
          curl -k -X POST https://srv-ai-apps.int.alpha-it-innovations.org/api/deploy/ttIhpb2X8TDnwloJT6Fz6 \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d '{
              "ref": "refs/heads/main",
              "repository": {
                "full_name": "AlphaITInnovations/AlphaRequestManager"
              }
            }'