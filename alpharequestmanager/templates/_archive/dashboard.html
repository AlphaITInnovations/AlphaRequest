{% extends "base.html" %}
{% block title %}Übersicht – AlphaRequest{% endblock %}

{% block head %}
<script>
document.addEventListener("alpine:init", () => {
  Alpine.data("dashboardManager", () => ({

    orders: {{ orders | tojson }},
    departmentRequests: {{ department_requests | tojson }},
    userName: "{{ user.displayName }}",
    allowedTypes: {{ allowed_ticket_types | tojson }},

    ticketTypes: [
      { key: "hardware", icon: "📦", label: "Hardwarebestellung" },
      { key: "zugang-beantragen", icon: "🔑", label: "Onboarding Mitarbeiter:innen" },
      { key: "zugang-sperren", icon: "🔒", label: "Offboarding Mitarbeiter:innen" },
      { key: "niederlassung-anmelden", icon: "🏢", label: "Niederlassung anmelden" },
      { key: "niederlassung-umzug", icon: "🔄", label: "Niederlassung umziehen" },
      { key: "niederlassung-schliessen", icon: "❌", label: "Niederlassung schließen" }
    ],

    filter: {
      search: "",
      status: "all",
      priority: "all",
      department: "all"
    },

    /* ================= KPI ================= */
    kpis() {
      return {
        myInProgress: this.orders.filter(o => o.status === "in_progress").length,

        departmentTotal: this.departmentRequests.reduce(
          (sum, dept) => sum + dept.tickets.length,
          0
        )
      };
    },
    filterMyInProgress() {
      this.filter.status = "in_progress";
    },

    filterDepartment() {
      this.filter.department = "all";
    },
    setStatusFilter(status) {
      this.filter.status = status;
    },

    /* ================= HELPERS ================= */

    canCreate(key) {
      return this.allowedTypes.includes(key);
    },

    openNew(key) {
      if (!this.canCreate(key)) return;
      window.location.href = `/tickets/new/${key}`;
    },

    openUserTicket(o) {
      window.location.href = `/tickets/edit/${o.type_key}/${o.id}`;
    },

    openGroupTicket(o, groupId) {
      window.location.href =
        `/tickets/group/${o.type_key}/${o.id}?department=${groupId}`;
    },

    filteredOrders() {
      return this.orders.filter(o => {
        const q = this.filter.search.toLowerCase();
        return (
          (!q || o.type.toLowerCase().includes(q)) &&
          (this.filter.status === "all" || o.status === this.filter.status) &&
          (this.filter.priority === "all" || o.priority === this.filter.priority)
        );
      });
    },

    filteredDepartments() {
      if (this.filter.department === "all") return this.departmentRequests;
      return this.departmentRequests.filter(
        d => d.group_id === this.filter.department
      );
    },

    statusColor(status) {
      return {
        in_progress: "text-yellow-500",
        in_request: "text-primary",
        approved: "text-green-500",
        rejected: "text-red-500"
      }[status] || "";
    }

  }));
});
</script>
{% endblock %}

{% block content %}
<div x-data="dashboardManager()" class="space-y-10">

  <!-- ================= HEADER ================= -->
  <div>
    <h1 class="text-2xl font-semibold">
      Willkommen zurück,
      <span class="text-primary" x-text="userName"></span>
        👋
    </h1>
    <p class="muted mt-1 text-sm">
      Hier ist deine aktuelle Übersicht.
    </p>
  </div>


  <!-- ================= GRID ================= -->
  <div class="grid grid-cols-1 lg:grid-cols-[360px_1fr] gap-10">

<!-- ================= AUFTRAGSTYPEN ================= -->
<aside class="card card--pad space-y-5 h-fit sticky top-6">

  <div class="flex items-center justify-between">
    <h2 class="text-lg font-semibold text-primary">
      Neuer Auftrag
    </h2>

  </div>

  <div class="space-y-3">

    <template x-for="t in ticketTypes" :key="t.key">
      <template x-if="canCreate(t.key)">
        <button
          @click="openNew(t.key)"
          class="w-full flex items-center gap-4 px-5 py-3 rounded-xl
                 bg-primary text-white font-medium
                 hover:bg-primaryHover
                 transition-all duration-200"
        >
          <span class="text-lg" x-text="t.icon"></span>
          <span class="truncate text-sm" x-text="t.label"></span>
        </button>
      </template>
    </template>

  </div>

</aside>

    <!-- ================= CONTENT ================= -->
    <section class="space-y-10">

      <!-- ================= DEINE AUFTRÄGE ================= -->
      <div class="card card--pad space-y-6">

        <div class="flex justify-between items-center">
          <h2 class="text-xl font-semibold text-primary">
            Deine Aufträge
          </h2>
          <span class="muted text-sm"
                x-text="filteredOrders().length + ' Einträge'"></span>
        </div>

        <!-- FILTER -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <input class="field" placeholder="Suchen…"
                 x-model="filter.search">
          <select class="field" x-model="filter.status">
            <option value="all">Alle Status</option>
            <option value="in_request">Zu bearbeiten</option>
            <option value="in_progress">In Bearbeitung</option>
            <option value="approved">Erledigt</option>
          </select>
          <select class="field" x-model="filter.priority">
            <option value="all">Alle Prioritäten</option>
            <option value="low">Niedrig</option>
            <option value="medium">Mittel</option>
            <option value="high">Hoch</option>
            <option value="critical">Kritisch</option>
          </select>
        </div>

        <!-- LISTE -->
        <ul class="space-y-4 max-h-[480px] overflow-auto pr-1">
          <template x-for="o in filteredOrders()" :key="o.id">
            <li @click="openUserTicket(o)"
                class="p-5 rounded-xl cursor-pointer
                       border border-[var(--border)]
                       hover:border-primary/40
                       hover:shadow-sm
                       transition-all duration-200">

              <div class="flex justify-between">
                <div>
                  <div class="font-semibold"
                       x-text="o.type"></div>
                  <div class="muted text-sm"
                       x-text="o.date"></div>
                </div>

                <div class="text-right text-sm">
                  <div :class="statusColor(o.status)"
                       x-text="o.status"></div>
                  <div class="muted"
                       x-text="o.priority"></div>
                </div>
              </div>

            </li>
          </template>
        </ul>
      </div>

      <!-- ================= FACHABTEILUNGEN ================= -->
      <div class="card card--pad space-y-6">

        <div class="flex items-center justify-between">
          <h2 class="text-xl font-semibold text-primary">
            Fachabteilungen · Deine Aufgaben
          </h2>

          <select class="field w-64"
                  x-model="filter.department">
            <option value="all">Alle Fachabteilungen</option>
            <template x-for="d in departmentRequests"
                      :key="d.group_id">
              <option :value="d.group_id"
                      x-text="d.group_name"></option>
            </template>
          </select>
        </div>

        <template x-for="dept in filteredDepartments()"
                  :key="dept.group_id">

          <div x-data="{ open: true }"
               class="border border-[var(--border)]
                      rounded-xl overflow-hidden">

            <!-- HEADER -->
            <button @click="open=!open"
                    class="w-full flex justify-between items-center
                           px-5 py-4
                           bg-[var(--field-bg)]
                           hover:bg-primary/5
                           transition">

              <div class="flex items-center gap-3 font-medium">
                <span class="text-primary">🏢</span>
                <span x-text="dept.group_name"></span>
              </div>

              <div class="flex items-center gap-3">
                <span class="text-xs px-3 py-1 rounded-full
                             bg-primary/15 text-primary font-semibold"
                      x-text="dept.tickets.length"></span>

                <span x-text="open ? '−' : '+'"
                      class="text-lg text-primary"></span>
              </div>

            </button>

            <!-- BODY -->
            <div x-show="open"
                 x-transition
                 class="p-5 space-y-3">

              <template x-for="t in dept.tickets"
                        :key="t.id">
                <div @click="openGroupTicket(t, dept.group_id)"
                     class="p-4 rounded-lg cursor-pointer
                            border border-[var(--border)]
                            hover:border-primary/40
                            hover:shadow-sm
                            transition">

                  <div class="font-semibold truncate"
                       x-text="t.title"></div>

                  <div class="muted text-sm">
                    <span x-text="t.type_key"></span>
                    ·
                    <span x-text="t.created_at"></span>
                  </div>
                </div>
              </template>

              <div x-show="dept.tickets.length === 0"
                   class="muted italic text-sm">
                Keine offenen Aufgaben.
              </div>

            </div>

          </div>

        </template>

      </div>

    </section>

  </div>
</div>
{% endblock %}
